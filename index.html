<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MC Voice Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c10; --panel: #111520; --border: #1e2535;
    --accent: #00e5ff; --accent2: #7c3aed; --green: #10b981;
    --red: #ef4444; --amber: #f59e0b; --text: #e2e8f0;
    --muted: #64748b; --radius: 12px;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: "Syne", sans-serif; min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1.5rem; overflow-x: hidden;
  }
  body::before {
    content: ""; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .card {
    position: relative; z-index: 1; background: var(--panel);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 2.5rem 2rem; width: 100%; max-width: 480px;
    box-shadow: 0 0 60px rgba(0,229,255,.05), 0 24px 48px rgba(0,0,0,.4);
  }
  .header { display: flex; align-items: center; gap: .75rem; margin-bottom: 2rem; }
  .icon-wrap {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 10px; display: flex; align-items: center;
    justify-content: center; font-size: 1.3rem; flex-shrink: 0;
  }
  h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -.02em; }
  .sub { font-size: .78rem; color: var(--muted); font-family: "JetBrains Mono", monospace; }
  .status-bar {
    display: flex; align-items: center; gap: .6rem;
    background: #0d1117; border: 1px solid var(--border);
    border-radius: 8px; padding: .6rem 1rem; margin-bottom: 1.5rem;
    font-family: "JetBrains Mono", monospace; font-size: .8rem;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0; transition: background .3s;
  }
  .dot.connected  { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.error      { background: var(--red);   box-shadow: 0 0 8px var(--red); }
  .dot.connecting { background: var(--amber); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  #status-text { flex: 1; color: var(--text); }
  .name-input {
    width: 100%; padding: .9rem 1rem;
    background: #0d1117; border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: "Syne", sans-serif; font-size: 1rem;
    margin-bottom: .75rem; outline: none;
    transition: border-color .2s;
  }
  .name-input:focus { border-color: var(--accent2); }
  .name-input::placeholder { color: var(--muted); }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: .5rem;
    width: 100%; padding: .9rem; border: none; border-radius: 10px;
    font-family: "Syne", sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: transform .15s, box-shadow .15s, opacity .15s;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent2) 0%, #2563eb 100%);
    color: #fff; box-shadow: 0 4px 20px rgba(124,58,237,.3); margin-bottom: .75rem;
  }
  .btn-primary:hover:not(:disabled) { box-shadow: 0 4px 30px rgba(124,58,237,.5); }
  .btn-mute {
    background: #1e2535; color: var(--text);
    border: 1px solid var(--border); margin-bottom: .75rem;
  }
  .btn-mute.muted { background: rgba(239,68,68,.15); border-color: var(--red); color: var(--red); }
  .btn-mute:hover:not(:disabled) { background: #252d3d; }
  .viz-wrap {
    margin: 1.25rem 0; height: 56px; background: #0d1117;
    border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: none;
  }
  .viz-wrap.active { display: block; }
  canvas { display: block; width: 100%; height: 100%; }
  .section-title {
    font-size: .7rem; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: .6rem;
  }
  #player-list { display: flex; flex-direction: column; gap: .4rem; max-height: 200px; overflow-y: auto; }
  .player-row {
    display: flex; align-items: center; gap: .6rem; background: #0d1117;
    border: 1px solid var(--border); border-radius: 8px;
    padding: .5rem .75rem; font-size: .85rem; transition: border-color .2s;
  }
  .player-row.speaking { border-color: var(--green); }
  .player-row.speaking .player-dot { background: var(--green); }
  .player-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .player-name { flex: 1; }
  .empty-list { color: var(--muted); font-size: .82rem; text-align: center; padding: 1rem 0; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="icon-wrap">🎙️</div>
    <div>
      <h1>MC Voice Chat</h1>
      <div class="sub">Global voice — Bedrock & Java</div>
    </div>
  </div>
  <div class="status-bar">
    <div class="dot connecting" id="dot"></div>
    <span id="status-text">Enter your name to join…</span>
  </div>
  <input class="name-input" id="name-input" type="text" placeholder="Enter your Minecraft username" maxlength="32"/>
  <button class="btn btn-primary" id="btn-join">🎤 Join Voice Chat</button>
  <button class="btn btn-mute" id="btn-mute" disabled>🎤 Mute</button>
  <div class="viz-wrap" id="viz-wrap">
    <canvas id="viz"></canvas>
  </div>
  <div class="section-title">Players in Voice</div>
  <div id="player-list">
    <div class="empty-list">Join voice chat to see players</div>
  </div>
</div>

<script>
const BRIDGE_WS_URL = "wss://mc-voice-bridge-production.up.railway.app";

let ws = null, audioCtx = null, muted = false;
const players = new Map();
let nextPlayTime = 0;

const dot        = document.getElementById("dot");
const statusText = document.getElementById("status-text");
const btnJoin    = document.getElementById("btn-join");
const btnMute    = document.getElementById("btn-mute");
const vizWrap    = document.getElementById("viz-wrap");
const vizCanvas  = document.getElementById("viz");
const playerList = document.getElementById("player-list");
const nameInput  = document.getElementById("name-input");

btnJoin.addEventListener("click", async () => {
  const name = nameInput.value.trim();
  if (!name) {
    setStatus("error", "Please enter your Minecraft username!");
    nameInput.focus();
    return;
  }
  btnJoin.disabled  = true;
  nameInput.disabled = true;
  await startVoice(name);
});

btnMute.addEventListener("click", () => {
  muted = !muted;
  btnMute.classList.toggle("muted", muted);
  btnMute.textContent = muted ? "🔇 Unmute" : "🎤 Mute";
});

async function startVoice(playerName) {
  setStatus("connecting", "Requesting microphone…");
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        sampleRate: 48000,
        channelCount: 1,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      }
    });
  } catch(e) {
    setStatus("error", "Mic denied: " + e.message);
    btnJoin.disabled   = false;
    nameInput.disabled = false;
    return;
  }

  audioCtx  = new AudioContext({ sampleRate: 48000 });
  nextPlayTime = audioCtx.currentTime;

  // Capture mic as raw PCM using ScriptProcessor
  const source    = audioCtx.createMediaStreamSource(stream);
  const processor = audioCtx.createScriptProcessor(512, 1, 1);

  source.connect(processor);
  processor.connect(audioCtx.destination);

  processor.onaudioprocess = (e) => {
    if (muted || !ws || ws.readyState !== WebSocket.OPEN) return;
    const float32  = e.inputBuffer.getChannelData(0);
    const int16    = new Int16Array(float32.length);
    for (let i = 0; i < float32.length; i++) {
      int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
    }
    // Send: [0x10][int16 PCM data]
    const header = new Uint8Array([0x10]);
    const pcm    = new Uint8Array(int16.buffer);
    const packet = new Uint8Array(1 + pcm.length);
    packet.set(header, 0);
    packet.set(pcm, 1);
    ws.send(packet.buffer);
  };

  startVisualiser(stream);

  setStatus("connecting", "Connecting to bridge…");
  ws = new WebSocket(BRIDGE_WS_URL);
  ws.binaryType = "arraybuffer";

  ws.onopen = () => {
    ws.send(JSON.stringify({
      type: "browser_auth",
      name: playerName,
      uuid: "player-" + playerName
    }));
  };

  ws.onmessage = (e) => {
    if (e.data instanceof ArrayBuffer) {
      handleAudio(e.data);
    } else {
      handleJson(JSON.parse(e.data));
    }
  };

  ws.onclose = (e) => {
    setStatus("error", "Disconnected: " + (e.reason || "connection lost"));
    btnJoin.disabled   = false;
    nameInput.disabled = false;
    btnMute.disabled   = true;
  };

  ws.onerror = () => setStatus("error", "WebSocket error");
}

function handleJson(msg) {
  switch(msg.type) {
    case "auth_ok":
      setStatus("connected", "Connected as " + msg.name);
      btnMute.disabled = false;
      vizWrap.classList.add("active");
      break;
    case "auth_fail":
      setStatus("error", "Auth failed: " + (msg.reason || "unknown"));
      btnJoin.disabled   = false;
      nameInput.disabled = false;
      break;
    case "player_left":
      setStatus("error", "You left the server");
      break;
    case "mute_command":
      muted = msg.muted;
      btnMute.classList.toggle("muted", muted);
      btnMute.textContent = muted ? "🔇 Unmute" : "🎤 Mute";
      break;
    case "position_init":
      addPlayer(msg.uuid, msg.name);
      break;
  }
}

function handleAudio(data) {
  if (!audioCtx) return;
  const view    = new DataView(data);
  const firstByte = view.getUint8(0);
  if (firstByte !== 0x01) return;

  // Format: [0x01][nameLen][name bytes][int16 PCM]
  const nameLen  = view.getUint8(1);
  const name     = new TextDecoder().decode(new Uint8Array(data, 2, nameLen));
  const pcmBytes = new Uint8Array(data, 2 + nameLen);
  const int16    = new Int16Array(pcmBytes.buffer, pcmBytes.byteOffset, pcmBytes.byteLength / 2);

  // Convert Int16 to Float32
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) {
    float32[i] = int16[i] / 32768.0;
  }

  // Play audio smoothly
  const buffer = audioCtx.createBuffer(1, float32.length, 48000);
  buffer.copyToChannel(float32, 0);
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.connect(audioCtx.destination);

  const now = audioCtx.currentTime;
  if (nextPlayTime < now) nextPlayTime = now + 0.05;
  source.start(nextPlayTime);
  nextPlayTime += buffer.duration;

  // Show speaking indicator
  addPlayer("browser-" + name, name);
  const row = document.querySelector(`[data-name="${name}"]`);
  if (row) {
    row.classList.add("speaking");
    clearTimeout(row._t);
    row._t = setTimeout(() => row.classList.remove("speaking"), 500);
  }
}

function addPlayer(uuid, name) {
  if (!players.has(uuid)) {
    players.set(uuid, name);
    renderPlayerList();
  }
}

function renderPlayerList() {
  if (players.size === 0) {
    playerList.innerHTML = '<div class="empty-list">No players in voice yet</div>';
    return;
  }
  playerList.innerHTML = "";
  players.forEach((name, uuid) => {
    const row = document.createElement("div");
    row.className    = "player-row";
    row.dataset.name = name;
    row.innerHTML    = `<div class="player-dot"></div><span class="player-name">${escHtml(name)}</span>`;
    playerList.appendChild(row);
  });
}

function setStatus(state, msg) {
  dot.className      = "dot " + state;
  statusText.textContent = msg;
}

function escHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function startVisualiser(stream) {
  const a  = new AudioContext();
  const an = a.createAnalyser();
  an.fftSize = 256;
  a.createMediaStreamSource(stream).connect(an);
  const W    = vizCanvas.width  = vizCanvas.offsetWidth;
  const H    = vizCanvas.height = vizCanvas.offsetHeight;
  const vc   = vizCanvas.getContext("2d");
  const data = new Uint8Array(an.frequencyBinCount);
  function draw() {
    requestAnimationFrame(draw);
    an.getByteFrequencyData(data);
    vc.clearRect(0, 0, W, H);
    const bw = W / data.length * 2.5;
    data.forEach((v, i) => {
      const h = (v / 255) * H;
      vc.fillStyle = `hsl(${180 + (v/255)*60},100%,60%)`;
      vc.fillRect(i * (bw + 1), H - h, bw, h);
    });
  }
  draw();
}
</script>
</body>
   </html>
